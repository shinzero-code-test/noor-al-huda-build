name: Direct Build

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: Build target
        required: true
        default: both
        type: choice
        options:
          - android
          - ios
          - both

jobs:
  android:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'android' || inputs.target == 'both' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install mobile dependencies
        run: npm ci

      - name: Sync native Android project
        run: CI=1 node ./node_modules/expo/bin/cli prebuild --platform android --no-install

      - name: Build Android debug APK
        working-directory: apps/mobile/android
        run: chmod +x ./gradlew && ./gradlew assembleDebug --no-daemon

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: noor-al-huda-android-debug-apk
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  ios:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'ios' || inputs.target == 'both' }}
    runs-on: macos-15
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install mobile dependencies
        run: npm ci

      - name: Sync native iOS project
        run: CI=1 node ./node_modules/expo/bin/cli prebuild --platform ios --no-install

      - name: Install CocoaPods
        working-directory: apps/mobile/ios
        run: pod install --repo-update

      - name: Build iOS simulator app
        working-directory: apps/mobile/ios
        run: |
          xcodebuild \
            -workspace nwralhda.xcworkspace \
            -scheme nwralhda \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package iOS simulator app
        run: |
          cd ios/build/Build/Products/Debug-iphonesimulator
          zip -r ../../../../noor-al-huda-ios-simulator.zip nwralhda.app

      - name: Upload iOS simulator artifact
        uses: actions/upload-artifact@v4
        with:
          name: noor-al-huda-ios-simulator-app
          path: apps/mobile/noor-al-huda-ios-simulator.zip
          if-no-files-found: error
